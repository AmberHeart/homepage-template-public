name: Get Citation Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    if: ${{ secrets.GOOGLE_SCHOLAR_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          cd ./google_scholar_crawler
          pip install -r requirements.txt
      - name: Crawl Google Scholar
        run: |
          cd ./google_scholar_crawler
          python main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
      - name: Commit and Push
        run: |
          cp ./google_scholar_crawler/results/*.json ./google_scholar_data/
          git config --local user.name "${GITHUB_ACTOR}"
          git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add google_scholar_data/*.json
          git diff --staged --quiet || git commit -m "chore: update citation data" && git push
