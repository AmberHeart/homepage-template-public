<script>
(function () {
  function formatCount(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "m";
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
    return String(n);
  }

  function readCache(key, ttlMs) {
    try {
      var raw = localStorage.getItem(key);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      if (!parsed || !parsed.t || Date.now() - parsed.t > ttlMs) return null;
      return parsed.v;
    } catch (e) {
      return null;
    }
  }

  function writeCache(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify({ t: Date.now(), v: value }));
    } catch (e) {}
  }

  function appendChip(anchor, text) {
    if (!anchor || anchor.dataset.metricApplied === "1") return;
    var chip = document.createElement("span");
    chip.className = "live-metric-chip";
    chip.textContent = text;
    anchor.appendChild(chip);
    anchor.dataset.metricApplied = "1";
  }

  function fetchRepoStars(anchor) {
    var href = anchor.getAttribute("href") || "";
    if (!/github\.com\/[^\/]+\/[^\/]+/.test(href)) return;
    var match = href.match(/github\.com\/([^\/]+)\/([^\/#?]+)/);
    if (!match) return;
    var owner = match[1];
    var repo = match[2].replace(/\.git$/, "");
    var cacheKey = "gh-stars:" + owner + "/" + repo;
    var cached = readCache(cacheKey, 6 * 60 * 60 * 1000);
    if (cached != null) {
      appendChip(anchor, "★ " + formatCount(cached));
      return;
    }
    fetch("https://api.github.com/repos/" + owner + "/" + repo)
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        if (!data || typeof data.stargazers_count !== "number") return;
        writeCache(cacheKey, data.stargazers_count);
        appendChip(anchor, "★ " + formatCount(data.stargazers_count));
      })
      .catch(function () {});
  }

  document.addEventListener("DOMContentLoaded", function () {
    var links = document.querySelectorAll(".page__content .paper-links a, .page__content .project-links a, .page__content .links a");
    links.forEach(function (a) {
      var text = (a.textContent || "").trim().toLowerCase();
      if (text === "[code]") fetchRepoStars(a);
    });
  });
})();
</script>
